<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>🎁 Secret Scratch Card</title>
    <meta name="theme-color" content="#1a1a2e">
    
    <meta property="og:title" content="🎁 Aapke liye ek Secret Card hai!">
    <meta property="og:description" content="Kisine aapke liye ek surprise message bheja hai. Card ko scratch karke dekhiye!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1200&auto=format&fit=crop">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; touch-action: manipulation; }

        body {
            background: radial-gradient(circle at center, #2b2b45 0%, #121220 100%);
            color: white; min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; overflow: hidden; padding: 20px;
        }

        .container {
            width: 100%; max-width: 420px; text-align: center;
            background: rgba(255, 255, 255, 0.05); padding: 30px 20px; border-radius: 20px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 26px; margin-bottom: 5px; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #a0aab2; font-size: 15px; margin-bottom: 25px; }

        /* Scratch Card */
        .scratch-card-wrapper {
            position: relative; width: 300px; height: 180px; margin: 0 auto 25px;
            border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #fff;
        }

        .message-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; font-size: 22px; font-weight: bold; color: #1e293b;
            text-align: center; word-break: break-word;
        }

        canvas#scratchCanvas { position: absolute; top: 0; left: 0; cursor: pointer; z-index: 2; }

        /* Inputs & Buttons */
        textarea {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 20px; outline: none;
            font-size: 16px; resize: none; height: 100px;
        }
        textarea:focus { border-color: #00d2ff; }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px;
        }
        .btn:active { transform: scale(0.95); }
        
        .btn-primary { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3); }
        .btn-whatsapp { background: #25D366; color: white; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); }
        .btn-copy { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

        /* Share Area */
        #shareArea { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .link-input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5); color: #00d2ff; margin-bottom: 15px; outline: none; text-align: center;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
        
        #toast {
            position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 10px 20px; border-radius: 30px;
            font-weight: bold; transition: 0.3s; opacity: 0; z-index: 1000;
        }
        #toast.show { bottom: 20px; opacity: 1; }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container" id="createView">
        <h1>Secret Scratch Card</h1>
        <p>Apne doston ke liye ek gupt sandesh likhein</p>
        
        <textarea id="userInput" placeholder="Yaha apna secret message likho (Emojis allowed)..." maxlength="150"></textarea>
        <button class="btn btn-primary" id="genBtn">✨ Generate Magic Link</button>

        <div id="shareArea">
            <p style="color: #fff; margin-top: 10px;">Link Ready Hai! 👇</p>
            <input type="text" id="generatedLink" class="link-input" readonly>
            
            <button class="btn btn-whatsapp" onclick="sendToWhatsApp()">📱 Direct WhatsApp Pe Bhejo</button>
            <button class="btn btn-copy" onclick="copyLink()" id="copyBtn">📋 Link Copy Karo</button>
            <button class="btn btn-copy" onclick="location.reload()" style="margin-top: 20px; border: none;">🔄 Naya Banao</button>
        </div>
    </div>

    <div class="container" id="scratchView" style="display: none;">
        <h1>Surprise! 🎁</h1>
        <p>Niche diye gaye card ko scratch karke dekho</p>
        
        <div class="scratch-card-wrapper">
            <div class="message-layer" id="revealedMessage"></div>
            <canvas id="scratchCanvas" width="300" height="180"></canvas>
        </div>
        
        <button class="btn btn-primary" onclick="window.location.href = window.location.pathname">Mera Apna Card Banao</button>
    </div>

    <div id="toast">📋 Link Copied!</div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // --- 1. SETUP & URL CHECK ---
        const createView = document.getElementById('createView');
        const scratchView = document.getElementById('scratchView');
        const urlParams = new URLSearchParams(window.location.search);
        const secretData = urlParams.get('m');

        // Safe Encoding/Decoding for Emojis & Hindi
        const encodeMsg = (str) => btoa(encodeURIComponent(str));
        const decodeMsg = (str) => decodeURIComponent(atob(str));

        if (secretData) {
            createView.style.display = 'none';
            scratchView.style.display = 'block';
            try {
                document.getElementById('revealedMessage').innerText = decodeMsg(secretData);
                initScratchCard();
            } catch(e) {
                document.getElementById('revealedMessage').innerText = "Card Expired ya Link Galat Hai!";
                initScratchCard();
            }
        }

        // --- 2. LINK GENERATION & SHARING ---
        document.getElementById('genBtn').onclick = () => {
            const msg = document.getElementById('userInput').value.trim();
            if(!msg) return alert("Pehle message toh likho bhai!");
            
            const encoded = encodeMsg(msg);
            const shareUrl = window.location.origin + window.location.pathname + '?m=' + encoded;
            
            document.getElementById('generatedLink').value = shareUrl;
            document.getElementById('userInput').style.display = 'none';
            document.getElementById('genBtn').style.display = 'none';
            document.getElementById('shareArea').style.display = 'block';
        };

        function sendToWhatsApp() {
            const url = document.getElementById('generatedLink').value;
            const text = `🎁 Dekho maine tumhare liye ek Secret Card bheja hai! Ise jaldi scratch karke dekho: \n\n${url}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function copyLink() {
            const linkInput = document.getElementById('generatedLink');
            linkInput.select();
            linkInput.setSelectionRange(0, 99999); // For mobile devices

            try {
                navigator.clipboard.writeText(linkInput.value).then(() => {
                    showToast();
                });
            } catch (err) {
                // Fallback for older browsers
                document.execCommand("copy");
                showToast();
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            document.getElementById('copyBtn').innerText = "✅ Copied!";
            setTimeout(() => { 
                toast.classList.remove('show'); 
                document.getElementById('copyBtn').innerText = "📋 Link Copy Karo";
            }, 2000);
        }

        // --- 3. ADVANCED SCRATCH CARD LOGIC ---
        function initScratchCard() {
            const canvas = document.getElementById('scratchCanvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            // Draw Silver Foil
            const grad = ctx.createLinearGradient(0, 0, 300, 180);
            grad.addColorStop(0, '#a8b2c1');
            grad.addColorStop(0.5, '#cfd8dc');
            grad.addColorStop(1, '#a8b2c1');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 300, 180);

            // Draw "Scratch Here" text
            ctx.fillStyle = "#455a64";
            ctx.font = "bold 20px Outfit";
            ctx.textAlign = "center";
            ctx.fillText("✨ SCRATCH HERE ✨", 150, 95);

            let isDrawing = false;
            let revealed = false;

            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function scratch(e) {
                if (!isDrawing) return;
                e.preventDefault(); // Stop scrolling while scratching on mobile
                
                const pos = getCoordinates(e);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 22, 0, Math.PI * 2); // 22 is brush size
                ctx.fill();
                
                checkScratchPercent();
            }

            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); }, {passive: false});
            window.addEventListener('mouseup', () => isDrawing = false);
            window.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', scratch, {passive: false});

            function checkScratchPercent() {
                if (revealed) return;
                
                // Calculate transparent pixels
                const imageData = ctx.getImageData(0, 0, 300, 180);
                const pixels = imageData.data;
                let clearPixels = 0;

                // Check every 4th value (Alpha channel)
                for (let i = 3; i < pixels.length; i += 16) { 
                    if (pixels[i] < 128) clearPixels++;
                }

                // Total pixels checked = (300 * 180) / 4 = 13500
                const percent = (clearPixels / 13500) * 100;
                
                if (percent > 40) { // Reveal completely at 40% scratched
                    revealed = true;
                    ctx.clearRect(0, 0, 300, 180); // Clear remaining foil
                    
                    // Trigger Confetti
                    confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#00d2ff', '#3a7bd5', '#ffffff', '#ff4757']
                    });
                }
            }
        }
    </script>
</body>
</html>
